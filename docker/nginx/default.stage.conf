upstream php-fpm {
    server app:9000;
}

server {
    listen 80;
    server_name api.alperensarikaya.online phpmyadmin.alperensarikaya.online opensearch.alperensarikaya.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html/public;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.alperensarikaya.online;

    ssl_certificate /etc/letsencrypt/live/api.alperensarikaya.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.alperensarikaya.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

server {
    listen 443 ssl http2;
    server_name phpmyadmin.alperensarikaya.online;

    ssl_certificate /etc/letsencrypt/live/api.alperensarikaya.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.alperensarikaya.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://couple-balance-phpmyadmin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}


server {
    listen 80;
    server_name logs.alperensarikaya.online;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name opensearch.alperensarikaya.online;

    ssl_certificate /etc/letsencrypt/live/opensearch.alperensarikaya.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opensearch.alperensarikaya.online/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5601;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
